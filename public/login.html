<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Career Copilot</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { background: var(--bg); }
    .auth-card { box-shadow: 0 4px 32px rgba(26,122,110,0.08); }
  </style>
</head>
<body class="auth-page">
  <div class="auth-card animate-slide-up">
    <a href="/" class="auth-logo">
      <div class="auth-logo-icon" style="font-family:var(--font-head);font-size:0.625rem;font-weight:700;letter-spacing:-0.02em">CC</div>
      <span class="auth-logo-text">Career Copilot</span>
    </a>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Continue your career quest. Your progress is waiting.</p>

    <form class="auth-form" id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" placeholder="alex@example.com" autocomplete="email" required>
        <div class="form-error" id="email-error"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="Your password" autocomplete="current-password" required>
        <div class="form-error" id="password-error"></div>
      </div>

      <div id="form-error" style="display:none;background:rgba(229,62,62,0.08);border:1px solid rgba(229,62,62,0.2);border-radius:var(--radius-sm);padding:10px 14px;font-size:0.875rem;color:var(--red);"></div>

      <button type="submit" class="btn btn-primary" style="width:100%;padding:13px;font-family:var(--font-head)" id="submit-btn">
        Sign In →
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/signup.html">Get started free</a>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (CC.getCurrentUserId()) window.location.href = '/dashboard.html';

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submit-btn');
      const formErr  = document.getElementById('form-error');

      ['email','password'].forEach(f => document.getElementById(`${f}-error`).textContent = '');
      formErr.style.display = 'none';

      let valid = true;
      if (!email)    { document.getElementById('email-error').textContent = 'Enter your email'; valid = false; }
      if (!password) { document.getElementById('password-error').textContent = 'Enter your password'; valid = false; }
      if (!valid) return;

      const user = CC.getUsers().find(u => u.email === email && u.password === password);
      if (!user) {
        formErr.textContent = 'Incorrect email or password. Please try again.';
        formErr.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      localStorage.setItem(CC.KEYS.CURRENT, user.id);

      const progress = CC.getProgress(user.id);
      window.location.href = (progress && progress.onboardingComplete) ? '/dashboard.html' : '/onboarding.html';
    });
  </script>
</body>
</html>
