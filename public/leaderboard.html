<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — Career Copilot</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { background: var(--bg); padding-top: 60px; min-height: 100vh; }
    .lb-layout { max-width: 860px; margin: 0 auto; padding: 32px 20px; }

    /* Header */
    .lb-header { margin-bottom: 28px; }
    .lb-title { font-family: var(--font-head); font-size: 1.75rem; font-weight: 700; letter-spacing: -0.03em; color: var(--text); margin-bottom: 6px; }
    .lb-sub { font-size: 0.9375rem; color: var(--text-2); }

    /* Tabs */
    .lb-tabs { display: flex; gap: 6px; margin-bottom: 20px; background: var(--bg-1); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; width: fit-content; }
    .lb-tab { padding: 7px 20px; border-radius: 6px; font-size: 0.875rem; font-weight: 600; color: var(--text-2); cursor: pointer; transition: var(--t); }
    .lb-tab.active { background: var(--teal); color: #fff; }
    .lb-tab:not(.active):hover { background: var(--bg-2); color: var(--text); }

    /* Champion banner */
    .champion-banner {
      background: linear-gradient(135deg, rgba(26,122,110,0.08), rgba(26,122,110,0.04));
      border: 1px solid rgba(26,122,110,0.25);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      display: flex; align-items: center; gap: 18px;
      margin-bottom: 20px;
    }
    .champion-crown { font-size: 2rem; flex-shrink: 0; }
    .champion-info { flex: 1; min-width: 0; }
    .champion-label { font-family: var(--font-head); font-size: 0.6875rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--teal); margin-bottom: 4px; }
    .champion-name { font-family: var(--font-head); font-size: 1.25rem; font-weight: 700; color: var(--text); }
    .champion-stats { font-size: 0.875rem; color: var(--text-2); margin-top: 2px; }
    .champion-xp { font-family: var(--font-head); font-size: 1.5rem; font-weight: 700; color: var(--teal); }

    /* Rank list */
    .rank-list { display: flex; flex-direction: column; gap: 8px; }
    .rank-row {
      background: var(--bg-1); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 16px 20px;
      display: flex; align-items: center; gap: 16px;
      transition: var(--t);
    }
    .rank-row:hover { border-color: var(--border-md); transform: translateX(2px); }
    .rank-row.is-you { border-color: rgba(26,122,110,0.35); background: rgba(26,122,110,0.03); }
    .rank-num { font-family: var(--font-head); font-size: 1.125rem; font-weight: 700; color: var(--text-3); width: 36px; text-align: center; flex-shrink: 0; }
    .rank-num.gold   { color: #d4960a; }
    .rank-num.silver { color: #7a8fa8; }
    .rank-num.bronze { color: #b07340; }
    .rank-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--teal); display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-size: 1rem; font-weight: 700; color: #fff; flex-shrink: 0; }
    .rank-avatar.you-av { background: linear-gradient(135deg, var(--teal), var(--teal-mid)); box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--teal); }
    .rank-info { flex: 1; min-width: 0; }
    .rank-name { font-weight: 700; font-size: 0.9375rem; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .you-badge { font-size: 0.6875rem; font-weight: 700; padding: 2px 8px; background: var(--teal); color: #fff; border-radius: 99px; font-family: var(--font-head); letter-spacing: 0.04em; }
    .rank-sub { font-size: 0.8125rem; color: var(--text-2); margin-top: 2px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .rank-school-tag { font-size: 0.75rem; padding: 2px 8px; background: var(--bg-2); border: 1px solid var(--border-md); border-radius: 4px; color: var(--text-3); }
    .rank-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .rank-xp { font-family: var(--font-head); font-size: 1.125rem; font-weight: 700; color: var(--teal); }
    .rank-meta { font-size: 0.75rem; color: var(--text-3); }
    .rank-streak { font-size: 0.75rem; color: var(--text-3); }

    /* Level badge inline */
    .rank-level-badge { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; background: var(--teal); border-radius: 4px; font-family: var(--font-head); font-size: 0.6875rem; font-weight: 700; color: #fff; }

    /* Medal icons for top 3 */
    .medal { font-size: 1.25rem; }

    /* School leagues */
    .league-section { margin-bottom: 24px; }
    .league-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .league-school-name { font-family: var(--font-head); font-size: 1rem; font-weight: 700; color: var(--text); }
    .league-count { font-size: 0.8125rem; color: var(--text-3); }
    .your-league-tag { font-size: 0.6875rem; padding: 2px 8px; background: rgba(26,122,110,0.1); border: 1px solid rgba(26,122,110,0.2); border-radius: 4px; color: var(--teal); font-weight: 700; font-family: var(--font-head); }

    /* Empty state */
    .lb-empty { text-align: center; padding: 48px 24px; color: var(--text-3); }
    .lb-empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .lb-empty-title { font-family: var(--font-head); font-size: 1rem; font-weight: 700; color: var(--text-2); margin-bottom: 6px; }

    /* User rank callout */
    .your-rank-callout { background: rgba(26,122,110,0.06); border: 1px solid rgba(26,122,110,0.2); border-radius: var(--radius-lg); padding: 16px 20px; display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    .your-rank-num { font-family: var(--font-head); font-size: 2rem; font-weight: 700; color: var(--teal); min-width: 52px; text-align: center; }
    .your-rank-info {}
    .your-rank-label { font-family: var(--font-head); font-size: 0.6875rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--teal); margin-bottom: 2px; }
    .your-rank-detail { font-size: 0.875rem; color: var(--text-2); }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="nav-logo"><div class="nav-logo-icon" style="font-family:var(--font-head);font-size:0.625rem;font-weight:700;letter-spacing:-0.02em">CC</div>Career Copilot</a>
      <div class="nav-links">
        <a href="/dashboard.html" class="nav-link">For You</a>
        <a href="/leaderboard.html" class="nav-link active">Leaderboard</a>
        <a href="/portfolio.html" class="nav-link">Portfolio</a>
      </div>
      <div class="nav-actions">
        <div class="streak-badge"><span id="streak-count">0</span> day streak</div>
        <div class="nav-user"><div class="nav-avatar" data-nav-avatar>U</div><span data-nav-user>User</span></div>
        <button class="btn btn-ghost btn-sm" onclick="CC.logout()">Sign out</button>
      </div>
    </div>
  </nav>

  <div class="lb-layout">
    <div class="lb-header">
      <h1 class="lb-title">Global Leaderboard</h1>
      <p class="lb-sub">See how you rank against learners worldwide. Updated in real time.</p>
    </div>

    <div class="lb-tabs">
      <div class="lb-tab active" id="tab-global" onclick="showTab('global')">Global</div>
      <div class="lb-tab" id="tab-schools" onclick="showTab('schools')">Schools</div>
    </div>

    <!-- Global tab -->
    <div id="view-global">
      <div id="your-rank-callout" class="your-rank-callout" style="display:none"></div>
      <div id="champion-banner" class="champion-banner" style="display:none"></div>
      <div class="rank-list" id="global-list"></div>
    </div>

    <!-- Schools tab -->
    <div id="view-schools" style="display:none">
      <div id="schools-list"></div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (!CC.requireAuth()) throw new Error('Not auth');
    CC.renderNavUser();

    const currentUser = CC.getUser();
    const progress    = CC.getProgress() || CC.defaultProgress();
    document.getElementById('streak-count').textContent = progress.streak || 0;

    // ── Demo users ──────────────────────────────────────────────────────────
    const DEMO_USERS = [
      { id: 'demo-1', name: 'Priya Sharma',    school: 'UC Berkeley',   xp: 4820, streak: 42, goal: 'ML Engineer',       avatar: 'P' },
      { id: 'demo-2', name: 'Marcus Williams', school: 'UT Austin',     xp: 3650, streak: 28, goal: 'Full-Stack Dev',    avatar: 'M' },
      { id: 'demo-3', name: 'Sarah Chen',      school: 'Stanford',      xp: 2940, streak: 31, goal: 'Data Scientist',    avatar: 'S' },
      { id: 'demo-4', name: 'Jordan Lee',      school: 'Self-Taught',   xp: 2380, streak: 14, goal: 'DevOps Engineer',   avatar: 'J' },
      { id: 'demo-5', name: 'Amara Osei',      school: 'MIT',           xp: 1920, streak: 22, goal: 'Product Manager',  avatar: 'A' },
      { id: 'demo-6', name: 'Tyler Brooks',    school: 'Georgia Tech',  xp: 1540, streak: 8,  goal: 'Cybersecurity',    avatar: 'T' },
      { id: 'demo-7', name: 'Mei Zhang',       school: 'CMU',           xp: 980,  streak: 11, goal: 'UX Designer',      avatar: 'Z' },
      { id: 'demo-8', name: 'Lucas Rivera',    school: 'Self-Taught',   xp: 620,  streak: 6,  goal: 'Mobile Dev',       avatar: 'L' },
      { id: 'demo-9', name: 'Nina Patel',      school: 'UC Berkeley',   xp: 430,  streak: 4,  goal: 'ML Engineer',      avatar: 'N' },
      { id: 'demo-10',name: 'Chris Adeyemi',   school: 'UT Austin',     xp: 180,  streak: 2,  goal: 'Full-Stack Dev',   avatar: 'C' },
    ];

    // ── Build full entry list ───────────────────────────────────────────────
    function buildEntries() {
      const entries = [];

      // Real users from localStorage (all accounts created on this browser)
      CC.getUsers().forEach(u => {
        const p = CC.getProgress(u.id) || CC.defaultProgress();
        entries.push({
          id: u.id,
          name: u.name,
          school: u.school || 'Independent',
          xp: p.xp || 0,
          streak: p.streak || 0,
          goal: p.goal || 'Career Learner',
          avatar: u.name.charAt(0).toUpperCase(),
          isYou: u.id === currentUser.id,
        });
      });

      // Demo users
      DEMO_USERS.forEach(d => {
        entries.push({ ...d, isYou: false });
      });

      // Sort by XP descending, then by streak for tiebreak
      entries.sort((a, b) => b.xp - a.xp || b.streak - a.streak);

      // Assign ranks
      entries.forEach((e, i) => { e.rank = i + 1; });
      return entries;
    }

    const entries = buildEntries();
    const myEntry = entries.find(e => e.isYou);

    // ── Render ──────────────────────────────────────────────────────────────
    function medalIcon(rank) {
      const c = ['#b8860b','#7a8fa8','#8c6239'];
      if (rank <= 3) return `<span style="font-family:var(--font-head);font-weight:700;color:${c[rank-1]}">#${rank}</span>`;
      return `<span class="rank-num">#${rank}</span>`;
    }

    function levelFrom(xp) {
      return CC.levelInfo(xp).level;
    }

    function rowHTML(e, showMedal = true) {
      const medalColors = ['#b8860b','#7a8fa8','#8c6239'];
      const rankCell = e.rank <= 3
        ? `<div style="width:36px;text-align:center;flex-shrink:0;font-family:var(--font-head);font-size:0.9375rem;font-weight:700;color:${medalColors[e.rank-1]}">#${e.rank}</div>`
        : `<div class="rank-num">#${e.rank}</div>`;
      const avCls = e.isYou ? 'rank-avatar you-av' : 'rank-avatar';
      const youBadge = e.isYou ? '<span class="you-badge">YOU</span>' : '';
      const lvl = levelFrom(e.xp);
      return `<div class="rank-row ${e.isYou ? 'is-you' : ''}">
        ${rankCell}
        <div class="${avCls}">${e.avatar}</div>
        <div class="rank-info">
          <div class="rank-name">${e.name} ${youBadge}</div>
          <div class="rank-sub">
            <span class="rank-level-badge">${lvl}</span>
            <span>${e.goal}</span>
            <span class="rank-school-tag">${e.school}</span>
          </div>
        </div>
        <div class="rank-right">
          <div class="rank-xp">${e.xp.toLocaleString()} XP</div>
          <div class="rank-streak">${e.streak}d streak</div>
        </div>
      </div>`;
    }

    function renderGlobal() {
      // Your rank callout
      if (myEntry) {
        const callout = document.getElementById('your-rank-callout');
        callout.style.display = 'flex';
        callout.innerHTML = `
          <div class="your-rank-num">#${myEntry.rank}</div>
          <div class="your-rank-info">
            <div class="your-rank-label">Your Global Rank</div>
            <div class="your-rank-detail">${myEntry.xp.toLocaleString()} XP · Level ${levelFrom(myEntry.xp)} · ${myEntry.streak}d streak</div>
          </div>`;
      }

      // Champion banner (rank #1)
      const champ = entries[0];
      if (champ) {
        const banner = document.getElementById('champion-banner');
        banner.style.display = 'flex';
        banner.innerHTML = `
          <div style="width:44px;height:44px;background:var(--teal);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:0.625rem;font-weight:700;color:#fff;letter-spacing:0.04em;flex-shrink:0">TOP</div>
          <div class="champion-info">
            <div class="champion-label">Monthly Top Learner</div>
            <div class="champion-name">${champ.name} ${champ.isYou ? '<span class="you-badge">YOU</span>' : ''}</div>
            <div class="champion-stats">${champ.school} · ${champ.goal}</div>
          </div>
          <div class="champion-xp">${champ.xp.toLocaleString()}<br><span style="font-size:0.8125rem;color:var(--text-2);font-family:var(--font-body)">total XP</span></div>`;
      }

      // List
      document.getElementById('global-list').innerHTML = entries.map(e => rowHTML(e)).join('');
    }

    function renderSchools() {
      // Group by school
      const groups = {};
      entries.forEach(e => {
        const s = e.school || 'Independent';
        if (!groups[s]) groups[s] = [];
        groups[s].push(e);
      });

      const mySchool = myEntry?.school;

      // Sort groups: user's school first, then by top XP
      const sorted = Object.entries(groups).sort(([a, aEntries], [b, bEntries]) => {
        if (a === mySchool) return -1;
        if (b === mySchool) return 1;
        return bEntries[0].xp - aEntries[0].xp;
      });

      let html = '';
      sorted.forEach(([school, members]) => {
        const isMySchool = school === mySchool;
        // Re-rank within school
        members.forEach((m, i) => { m.leagueRank = i + 1; });
        const myTagHTML = isMySchool ? '<span class="your-league-tag">YOUR LEAGUE</span>' : '';
        html += `<div class="league-section">
          <div class="league-header">
            <div class="league-school-name">${school}</div>
            <div class="league-count">${members.length} learner${members.length !== 1 ? 's' : ''}</div>
            ${myTagHTML}
          </div>
          <div class="rank-list">
            ${members.map(m => {
              const saved = m.rank;
              m.rank = m.leagueRank;
              const h = rowHTML(m);
              m.rank = saved;
              return h;
            }).join('')}
          </div>
        </div>`;
      });

      document.getElementById('schools-list').innerHTML = html || '<div class="lb-empty"><div class="lb-empty-title">No schools found</div><p style="font-size:0.875rem">Add your school or university during sign-up to join a league!</p></div>';
    }

    function showTab(tab) {
      document.getElementById('tab-global').classList.toggle('active', tab === 'global');
      document.getElementById('tab-schools').classList.toggle('active', tab === 'schools');
      document.getElementById('view-global').style.display  = tab === 'global'  ? 'block' : 'none';
      document.getElementById('view-schools').style.display = tab === 'schools' ? 'block' : 'none';
    }

    renderGlobal();
    renderSchools();
  </script>
</body>
</html>
