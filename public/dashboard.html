<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Career Copilot</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { background: var(--bg); padding-top: 60px; min-height: 100vh; }

    .dash-layout { max-width: 1280px; margin: 0 auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 18px; }

    /* Stats bar */
    .stats-bar {
      background: var(--bg-1); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 18px 24px;
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
      box-shadow: 0 2px 12px rgba(26,122,110,0.06);
    }
    .xp-section { flex: 1; min-width: 180px; max-width: 340px; }
    .xp-labels  { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.75rem; }
    .xp-val-txt { font-weight: 700; color: var(--teal); font-family: var(--font-head); }
    .goal-pill {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px; background: var(--bg-2);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 0.8125rem; color: var(--text-2);
      max-width: 280px; overflow: hidden;
    }
    .goal-pill-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Columns */
    .dash-columns { display: grid; grid-template-columns: 280px 1fr 260px; gap: 16px; align-items: start; }

    /* Panels */
    .panel {
      background: var(--bg-1); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px;
      box-shadow: 0 2px 12px rgba(26,122,110,0.05);
    }
    .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }

    /* Skill tree */
    .skill-panel { position: sticky; top: 80px; max-height: calc(100vh - 100px); overflow-y: auto; }
    .skill-level-group { margin-bottom: 20px; }
    .skill-level-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px;
      font-family: var(--font-head); font-size: 0.6875rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3);
    }
    .skill-level-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .skill-nodes-list { display: flex; flex-direction: column; gap: 6px; }
    .skill-node-wrap { display: flex; align-items: center; gap: 8px; }
    .skill-node-icon { font-size: 14px; flex-shrink: 0; }
    .skill-node-name { font-size: 0.8125rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .skill-node-check { margin-left: auto; font-size: 11px; color: var(--teal); flex-shrink: 0; }
    .skill-divider { height: 14px; display: flex; align-items: center; justify-content: center; }
    .skill-divider-line { width: 1px; height: 100%; background: var(--border); }

    /* Center */
    .center-col { display: flex; flex-direction: column; gap: 16px; }

    /* Quest progress mini bar */
    .quest-prog { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .quest-prog-bar { flex: 1; height: 4px; background: var(--bg-3); border-radius: 99px; overflow: hidden; }
    .quest-prog-fill { height: 100%; background: var(--teal); border-radius: 99px; transition: width 0.6s ease; }
    .quest-prog-txt { font-family: var(--font-head); font-size: 0.75rem; font-weight: 700; color: var(--text-2); white-space: nowrap; }
    .quest-list { display: flex; flex-direction: column; gap: 12px; }

    /* Resources */
    .resources-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .resource-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; transition: var(--t); }
    .resource-card:hover { border-color: var(--border-md); transform: translateY(-1px); }
    .resource-icon { font-size: 1.25rem; margin-bottom: 8px; }
    .resource-title { font-family: var(--font-head); font-size: 0.8125rem; font-weight: 700; margin-bottom: 4px; line-height: 1.3; color: var(--text); }
    .resource-provider { font-size: 0.75rem; color: var(--text-3); margin-bottom: 6px; }
    .resource-desc { font-size: 0.75rem; color: var(--text-2); line-height: 1.5; }

    /* Roadmap panel */
    .roadmap-panel { position: sticky; top: 80px; }
    .phase-item { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
    .phase-header-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .phase-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .phase-name-txt { font-family: var(--font-head); font-size: 0.8125rem; font-weight: 700; flex: 1; }
    .phase-pct-txt  { font-family: var(--font-head); font-size: 0.75rem; font-weight: 700; }
    .phase-desc-txt { font-size: 0.75rem; color: var(--text-2); line-height: 1.5; margin-top: 6px; }
    .phase-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .phase-chip { font-size: 0.6875rem; padding: 2px 8px; background: var(--bg-3); border-radius: 4px; color: var(--text-3); }
    .total-prog-wrap { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .total-prog-lbl { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-2); margin-bottom: 6px; font-family: var(--font-head); }

    .date-label { font-size: 0.8125rem; color: var(--text-3); margin-top: 2px; }

    @media (max-width: 1024px) {
      .dash-columns { grid-template-columns: 1fr 1fr; }
      .roadmap-panel { grid-column: 1/-1; position: static; }
      .resources-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 640px) {
      .dash-columns { grid-template-columns: 1fr; }
      .skill-panel  { position: static; max-height: none; }
      .resources-grid { grid-template-columns: 1fr; }
      .stats-bar { flex-direction: column; align-items: flex-start; }
      .xp-section { max-width: none; width: 100%; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="nav-logo">
        <div class="nav-logo-icon">🎯</div>
        Career Copilot
      </a>
      <div class="nav-links">
        <a href="/dashboard.html" class="nav-link active">For You</a>
        <a href="/portfolio.html" class="nav-link">Portfolio</a>
      </div>
      <div class="nav-actions">
        <div class="streak-badge">🔥 <span id="streak-count">0</span></div>
        <div class="nav-user">
          <div class="nav-avatar" data-nav-avatar>U</div>
          <span data-nav-user>User</span>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="CC.logout()">Sign out</button>
      </div>
    </div>
  </nav>

  <div class="dash-layout">

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="level-badge" id="level-badge">1</div>
      <div style="min-width:0">
        <div style="font-size:0.75rem;font-weight:600;color:var(--text-2);font-family:var(--font-head)">PLAYER LEVEL</div>
        <div style="font-family:var(--font-head);font-size:1.25rem;font-weight:700;color:var(--teal)" id="level-num">Level 1</div>
      </div>
      <div class="xp-section">
        <div class="xp-labels">
          <span class="text-3 text-sm">XP Progress</span>
          <span class="xp-val-txt" id="xp-label-val">0 / 100 XP</span>
        </div>
        <div class="xp-bar-track">
          <div class="xp-bar-fill" id="xp-fill" style="width:0%"></div>
        </div>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div class="goal-pill"><span>🎯</span><span class="goal-pill-text" id="goal-display">Loading...</span></div>
        <div style="font-family:var(--font-head);font-size:0.8125rem;color:var(--text-3)">Total: <strong id="total-xp-display" style="color:var(--teal)">0 XP</strong></div>
      </div>
    </div>

    <!-- Columns -->
    <div class="dash-columns">

      <!-- LEFT: Skill Tree -->
      <div class="panel skill-panel">
        <div class="panel-header">
          <div class="panel-title">Skill Tree</div>
          <span class="badge badge-teal" id="skills-badge">0 / 0</span>
        </div>
        <div id="skill-tree-container">
          <div style="text-align:center;padding:32px;color:var(--text-3)"><div class="spinner" style="margin:0 auto 12px"></div>Loading...</div>
        </div>
      </div>

      <!-- CENTER -->
      <div class="center-col">

        <!-- Quests -->
        <div class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title">Today's Quests</div>
              <div class="date-label" id="quest-date-label">—</div>
            </div>
            <button class="btn btn-secondary btn-sm" id="refresh-btn" onclick="refreshQuests()" style="font-family:var(--font-head)">
              <span id="refresh-icon">↻</span> New Quests
            </button>
          </div>
          <div class="quest-prog">
            <div class="quest-prog-bar"><div class="quest-prog-fill" id="qpf" style="width:0%"></div></div>
            <span class="quest-prog-txt" id="qpt">0 / 3</span>
          </div>
          <div class="quest-list" id="quest-list">
            <div style="text-align:center;padding:24px;color:var(--text-3)"><div class="spinner" style="margin:0 auto 12px"></div></div>
          </div>
        </div>

        <!-- Resources -->
        <div class="panel">
          <div class="panel-header" style="margin-bottom:14px">
            <div class="panel-title">Recommended Resources</div>
          </div>
          <div class="resources-grid" id="resources-grid">
            <div style="grid-column:1/-1;text-align:center;padding:16px;color:var(--text-3)">Loading...</div>
          </div>
        </div>

      </div>

      <!-- RIGHT: Roadmap -->
      <div class="panel roadmap-panel">
        <div class="panel-header">
          <div class="panel-title">Roadmap</div>
          <span class="badge badge-teal" id="roadmap-badge">— wks</span>
        </div>
        <div id="roadmap-phases">
          <div style="text-align:center;padding:20px;color:var(--text-3)"><div class="spinner" style="margin:0 auto 10px"></div></div>
        </div>
        <div class="total-prog-wrap">
          <div class="total-prog-lbl"><span>Overall Progress</span><span id="total-pct">0%</span></div>
          <div class="progress-bar"><div class="progress-fill" id="total-fill" style="width:0%"></div></div>
        </div>
      </div>

    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (!CC.requireAuth()) throw new Error('Not auth');
    CC.renderNavUser();

    let progress = null, refreshing = false;

    async function init() {
      progress = CC.getProgress();
      if (!progress || !progress.onboardingComplete) { window.location.href = '/onboarding.html'; return; }
      progress = CC.touchStreak(progress);
      if (!progress.todayQuests || progress.todayQuests.date !== CC.today()) {
        await fetchNewQuests();
      } else {
        CC.saveProgress(progress);
        render();
      }
    }

    function render() {
      renderStats(); renderSkillTree(); renderQuests(); renderRoadmap(); renderResources();
    }

    function renderStats() {
      const info = CC.levelInfo(progress.xp);
      document.getElementById('level-badge').textContent   = info.level;
      document.getElementById('level-num').textContent     = `Level ${info.level}`;
      document.getElementById('xp-label-val').textContent  = `${info.xpInLevel} / ${info.xpForNext} XP`;
      document.getElementById('total-xp-display').textContent = `${progress.xp} XP`;
      document.getElementById('goal-display').textContent  = progress.goal || 'Your career goal';
      document.getElementById('streak-count').textContent  = progress.streak || 0;
      requestAnimationFrame(() => { document.getElementById('xp-fill').style.width = `${info.pct}%`; });
    }

    function unlocked(skills, xp) {
      const s = new Set();
      skills.filter(k => k.level === 1 || k.unlocked).forEach(k => s.add(k.id));
      if (xp >= 100) skills.filter(k => k.level === 2).forEach(k => s.add(k.id));
      if (xp >= 300) skills.filter(k => k.level === 3).forEach(k => s.add(k.id));
      return s;
    }

    function renderSkillTree() {
      const container = document.getElementById('skill-tree-container');
      const skills    = progress.skillTree || [];
      if (!skills.length) { container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-3);font-size:0.875rem">No skills yet</div>'; return; }

      const ul = unlocked(skills, progress.xp);
      const done = new Set(progress.completedSkills || []);
      document.getElementById('skills-badge').textContent = `${done.size} / ${skills.length}`;

      const levels = {};
      skills.forEach(s => { (levels[s.level] = levels[s.level] || []).push(s); });
      const levelNames = { 1: 'Foundation', 2: 'Core Skills', 3: 'Advanced' };

      let html = '';
      Object.keys(levels).sort((a,b)=>a-b).forEach((lvl, li) => {
        if (li > 0) html += `<div class="skill-divider"><div class="skill-divider-line"></div></div>`;
        html += `<div class="skill-level-group"><div class="skill-level-header">${levelNames[lvl] || 'Skills'}</div><div class="skill-nodes-list">`;
        levels[lvl].forEach(skill => {
          const isComp = done.has(skill.id);
          const isUnl  = ul.has(skill.id);
          const icon   = CC.getSkillIcon(skill.name);
          let cls = 'skill-node ' + (isComp ? 'completed' : isUnl ? 'unlocked' : 'locked');
          const click = isUnl && !isComp ? `onclick="completeSkill('${skill.id}')" style="cursor:pointer"` : '';
          const tip   = skill.description ? `title="${skill.description}"` : '';
          html += `<div class="${cls}" data-id="${skill.id}" ${click} ${tip}>
            <div class="skill-node-wrap">
              <span class="skill-node-icon">${isUnl ? icon : '🔒'}</span>
              <span class="skill-node-name">${skill.name}</span>
              ${isComp ? '<span class="skill-node-check">✓</span>' : ''}
            </div>
          </div>`;
        });
        html += '</div></div>';
      });
      container.innerHTML = html;
    }

    function completeSkill(id) {
      if (!progress.completedSkills) progress.completedSkills = [];
      if (progress.completedSkills.includes(id)) return;
      const { progress: p, leveledUp, newLevel } = CC.awardXP(progress, 15);
      progress = p;
      progress.completedSkills.push(id);
      CC.saveProgress(progress);
      const el = document.querySelector(`[data-id="${id}"]`);
      if (el) CC.showXPPopup(15, el);
      CC.toast('Skill complete! +15 XP', 'success');
      if (leveledUp) setTimeout(() => CC.showLevelUpModal(newLevel), 600);
      renderStats(); renderSkillTree(); renderRoadmap();
    }

    function renderQuests() {
      const tq = progress.todayQuests;
      if (!tq || !tq.items || !tq.items.length) {
        document.getElementById('quest-list').innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-3)">No quests — click "New Quests" to generate!</div>';
        return;
      }
      const done = new Set(tq.completed || []);
      const total = tq.items.length;
      document.getElementById('quest-date-label').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
      document.getElementById('qpf').style.width  = `${(done.size/total)*100}%`;
      document.getElementById('qpt').textContent  = `${done.size} / ${total}`;

      const ICONS = { learn:'📚', practice:'💪', build:'🔨', review:'🔍' };
      document.getElementById('quest-list').innerHTML = tq.items.map(q => {
        const isDone = done.has(q.id);
        return `<div class="quest-card ${isDone?'completed':''}" data-type="${q.type}">
          <div class="quest-checkbox ${isDone?'checked':''}" onclick="completeQuest('${q.id}',${q.xp},this)">${isDone?'✓':''}</div>
          <div style="flex:1;min-width:0">
            <div class="quest-meta" style="margin-bottom:6px">
              <span class="badge badge-teal">${ICONS[q.type]||'⚡'} ${q.type}</span>
              <span class="quest-xp">+${q.xp} XP</span>
            </div>
            <div class="quest-title">${q.title}</div>
            <div class="quest-desc">${q.description}</div>
            <div class="quest-meta"><span class="quest-duration">⏱ ${q.duration}</span></div>
          </div>
        </div>`;
      }).join('');
    }

    function completeQuest(id, xp, cbEl) {
      const tq = progress.todayQuests;
      if (!tq || tq.completed.includes(id)) return;
      tq.completed.push(id);
      const { progress: p, leveledUp, newLevel } = CC.awardXP(progress, xp);
      progress = p;
      CC.saveProgress(progress);
      cbEl.classList.add('checked'); cbEl.textContent = '✓';
      const card = cbEl.closest('.quest-card');
      card.style.animation = 'questComplete 0.4s ease';
      setTimeout(() => card.classList.add('completed'), 400);
      CC.showXPPopup(xp, card);
      CC.toast(`Quest complete! +${xp} XP 🎉`, 'success');
      if (leveledUp) setTimeout(() => CC.showLevelUpModal(newLevel), 800);
      if (tq.completed.length === tq.items.length) setTimeout(() => CC.toast('All quests done! 🏆 Come back tomorrow.','success',5000), 1200);
      renderStats(); renderQuests(); renderRoadmap();
    }

    async function refreshQuests() {
      if (refreshing) return; refreshing = true;
      document.getElementById('refresh-btn').disabled = true;
      document.getElementById('refresh-icon').style.animation = 'spin 0.7s linear infinite';
      try {
        const info = CC.levelInfo(progress.xp);
        const res  = await fetch('/api/generate-quests', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ goal: progress.goal, completedSkills: progress.completedSkills||[], currentPhase: progress.roadmap?.phases?.[0]?.name||'Foundation', level: info.level })
        });
        const json = await res.json();
        if (json.success && json.data?.quests) {
          progress.todayQuests = { date: CC.today(), items: json.data.quests, completed: [] };
          CC.saveProgress(progress);
          renderQuests();
          CC.toast('Fresh quests generated! 🗡️', 'success');
        }
      } catch(e) { CC.toast('Failed to generate quests. Try again.','error'); }
      document.getElementById('refresh-icon').style.animation = '';
      document.getElementById('refresh-btn').disabled = false;
      refreshing = false;
    }

    async function fetchNewQuests() {
      try {
        const info = CC.levelInfo(progress.xp);
        const res  = await fetch('/api/generate-quests', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ goal: progress.goal, completedSkills: progress.completedSkills||[], currentPhase: progress.roadmap?.phases?.[0]?.name||'Foundation', level: info.level })
        });
        const json = await res.json();
        if (json.success && json.data?.quests) {
          progress.todayQuests = { date: CC.today(), items: json.data.quests, completed: [] };
        }
      } catch(e) { console.error(e); }
      CC.saveProgress(progress); render();
    }

    function renderRoadmap() {
      const rm = progress.roadmap;
      if (!rm) { document.getElementById('roadmap-phases').innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-3)">No roadmap data</div>'; return; }
      document.getElementById('roadmap-badge').textContent = `${rm.totalWeeks} wks`;
      const skills = progress.skillTree || [];
      const done   = new Set(progress.completedSkills || []);
      let totalS = 0, totalD = 0;

      const html = (rm.phases||[]).map((ph, pi) => {
        const ps    = skills.filter(s => s.level === pi+1);
        const pd    = ps.filter(s => done.has(s.id)).length;
        const pct   = ps.length ? Math.round(pd/ps.length*100) : 0;
        totalS += ps.length; totalD += pd;
        const color = ph.color || 'var(--teal)';
        const chips = (ph.skills||[]).slice(0,4).map(s=>`<span class="phase-chip">${s}</span>`).join('');
        return `<div class="phase-item">
          <div class="phase-header-row">
            <div class="phase-dot" style="background:${color}"></div>
            <div class="phase-name-txt">${ph.name}</div>
            <div class="phase-pct-txt" style="color:${color}">${pct}%</div>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="background:${color};width:${pct}%"></div></div>
          <div class="phase-desc-txt">${ph.description}</div>
          ${chips?`<div class="phase-chips">${chips}</div>`:''}
        </div>`;
      }).join('');

      document.getElementById('roadmap-phases').innerHTML = html;
      const op = totalS ? Math.round(totalD/totalS*100) : 0;
      document.getElementById('total-pct').textContent  = `${op}%`;
      document.getElementById('total-fill').style.width = `${op}%`;
    }

    function renderResources() {
      const res = progress.resources || [];
      if (!res.length) { document.getElementById('resources-grid').innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--text-3);padding:16px;font-size:0.875rem">Complete onboarding to unlock resources.</div>'; return; }
      const TICONS = { course:'📺', video:'▶️', article:'📖', book:'📚', tool:'🔧' };
      document.getElementById('resources-grid').innerHTML = res.map(r =>
        `<div class="resource-card">
          <div class="resource-icon">${TICONS[r.type]||'📌'}</div>
          <div class="resource-title">${r.title}</div>
          <div class="resource-provider">${r.provider}</div>
          <div class="resource-desc">${r.description||''}</div>
          <div style="margin-top:8px"><span class="badge badge-teal">${r.difficulty||'beginner'}</span></div>
        </div>`).join('');
    }

    init();
  </script>
</body>
</html>
